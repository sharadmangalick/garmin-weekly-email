name: Daily Ramp-Up Coach

on:
  # Run daily ~8:30 PM Pacific (03:30 UTC) — GH Actions delays ~15-75 min, targets ~9 PM inbox
  schedule:
    - cron: '30 3 * * *'

  # Allow manual trigger
  workflow_dispatch:

jobs:
  send-rampup-email:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install google-api-python-client google-auth

      - name: Create Gmail credentials
        env:
          GMAIL_CREDS_B64: ${{ secrets.GMAIL_CREDENTIALS_B64 }}
        run: |
          mkdir -p ~/.gmail-mcp
          python3 -c "import os,base64; open(os.path.expanduser('~/.gmail-mcp/credentials.json'),'w').write(base64.b64decode(os.environ['GMAIL_CREDS_B64'].strip()).decode())"

      - name: Create data directories
        run: mkdir -p data/{daily_summaries,sleep,heart_rate,vo2max,activities}

      - name: Create user config
        env:
          USER_CONFIG_B64: ${{ secrets.USER_CONFIG_B64 }}
        run: |
          python3 -c "import os,base64; open('data/user_config.json','w').write(base64.b64decode(os.environ['USER_CONFIG_B64'].strip()).decode())"

      - name: Run ramp-up coach
        env:
          GARMIN_EMAIL: ${{ secrets.GARMIN_EMAIL }}
          GARMIN_PASSWORD: ${{ secrets.GARMIN_PASSWORD }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python recovery_dashboard.py

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: rampup-logs
          path: logs/

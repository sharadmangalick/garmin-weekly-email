name: Weekly Training Email

on:
  # Run every Sunday at 7:00 AM Pacific (14:00 UTC)
  schedule:
    - cron: '0 14 * * 0'

  # Allow manual trigger with optional goal override
  workflow_dispatch:
    inputs:
      goal_type:
        description: 'Goal type (leave empty to use saved config)'
        required: false
        type: choice
        options:
          - ''
          - '5k'
          - '10k'
          - 'half_marathon'
          - 'marathon'
          - 'ultra'
          - 'build_mileage'
          - 'maintain_fitness'
          - 'base_building'
      goal_date:
        description: 'Race date YYYY-MM-DD (for race goals only)'
        required: false
        type: string
      goal_time_minutes:
        description: 'Target time in minutes (for race goals only)'
        required: false
        type: number
      current_weekly_mileage:
        description: 'Current weekly mileage (leave empty to use saved)'
        required: false
        type: number

jobs:
  send-weekly-email:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install google-api-python-client google-auth

      - name: Create Gmail credentials
        env:
          GMAIL_CREDS_B64: ${{ secrets.GMAIL_CREDENTIALS_B64 }}
        run: |
          mkdir -p ~/.gmail-mcp
          python3 -c "import os,base64; open(os.path.expanduser('~/.gmail-mcp/credentials.json'),'w').write(base64.b64decode(os.environ['GMAIL_CREDS_B64'].strip()).decode())"
          cat ~/.gmail-mcp/credentials.json

      - name: Create user config
        env:
          USER_CONFIG_B64: ${{ secrets.USER_CONFIG_B64 }}
        run: |
          mkdir -p data
          python3 -c "import os,base64; open('data/user_config.json','w').write(base64.b64decode(os.environ['USER_CONFIG_B64'].strip()).decode())"

      - name: Fetch Garmin data and send email
        env:
          GARMIN_EMAIL: ${{ secrets.GARMIN_EMAIL }}
          GARMIN_PASSWORD: ${{ secrets.GARMIN_PASSWORD }}
          # Optional goal overrides from workflow_dispatch
          GOAL_TYPE_OVERRIDE: ${{ github.event.inputs.goal_type }}
          GOAL_DATE_OVERRIDE: ${{ github.event.inputs.goal_date }}
          GOAL_TIME_OVERRIDE: ${{ github.event.inputs.goal_time_minutes }}
          WEEKLY_MILEAGE_OVERRIDE: ${{ github.event.inputs.current_weekly_mileage }}
        run: |
          python automated_weekly_email.py

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: logs
          path: logs/
